name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  BUILD:
    name: Compilar Projeto
    runs-on: ubuntu-latest

    steps:
       - uses: actions/checkout@v4
    
       - name: Set up Python 3.10
         uses: actions/setup-python@v3
         with:
            python-version: "3.11"
    
       - name: Install dependencies
         run: |
            python -m pip install --upgrade pip
            pip install flake8 pytest
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
       - name: Lint with flake8
         run: |
               flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
               
       - name: Teste do APP
         run: |
             PYTHONPATH=. pytest test/ -v --tb=short
   
  IMAGEM:
    name: Construindo Imagem no Docker
    runs-on: ubuntu-latest
    needs: BUILD
    steps:
      - name: Login no Docker
        uses: docker/login-action@v4.1.0
        with:
          username: ${{secrets.DOCKER_USUARIO}}
          password: ${{secrets.DOCKER_PWD}}

      - name: Build e Publish DockerHub
        uses: docker/build-push-action@v7.1.0
        with:
          push: true
          tags:  |
             ngaloni/senai_api_tb:latest
             ngaloni/senai_api_tb:${{github.sha}}
  DEPLOY:
    name: Implantando na EC2
    runs-on: ubuntu-latest
    needs: IMAGEM

    steps:
      - name: Deploy na EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.KEY}}
          script: |
              # fazer o pull da imagem dockerhub
              sudo docker pull ngaloni/senai_api_tb:latest
              
              #  Parar o app atual e remover o container
              sudo docker stop senai_api_tb 2>/dev/null || true
              sudo docker rm senai_api_tb 2>/dev/null ||true

              # publicar no novo container
              sudo docker run --name senai_api_tb -d \
                  --restart unless-stopped -p 80:8080 ngaloni/senai_api_tb:latest

              # Verificar se publicou
              sleep 5
              curl -f http://localhost:8080/health || exit 1
              echo " Deploy feito com sucesso!"
              

      
